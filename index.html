<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mworks Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🔥 LOADING -->
<div id="loading-screen">
    <div class="loader-content">
        <h1 class="glow">MWORKS SYSTEM</h1>
        <p>> Initializing System...</p>
        <p>> Loading Portfolio...</p>
        <p>> Status: <span class="glow">ONLINE</span></p>

         <div class="loading-bar">
    <div class="progress" id="progress"></div>  
</div>

<p id="loadText">0%</p>
    </div>
</div>

<canvas id="particles"></canvas>

<!-- ================= HEADER ================= -->
<header class="header">


    <!-- PROFILE CARD -->
    <section class="profile-card">
       
        <div class="avatar-frame">
    <img src="images/profile.jpg" id="profileImg" class="profile-pic" alt="Profile" onclick="rankUp()">

    <div class="glow-ring"></div>
    <div class="smoke"></div>
</div>
</div>
        </div>

        <div class="profile-info">
            <div class="name-row">
                <h2 class="glow">Mworks Developer</h2>
                <span class="rank">RANK E</span>
            </div>

            <p>Electronics Engineer • Embedded Systems • IoT Builder</p>

            <div class="stats">
                <div class="stat"><span>STR</span><div class="bar"><div style="width:60%"></div></div></div>
                <div class="stat"><span>INT</span><div class="bar"><div style="width:85%"></div></div></div>
                <div class="stat"><span>AGI</span><div class="bar"><div style="width:70%"></div></div></div>
            </div>
        </div>

    </section>
</header>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard">

    <!-- LEFT PANEL -->
    <aside class="left-panel">
        <div class="menu">
            <button onclick="openTab('profile')">Profile</button>
            <button onclick="openTab('skills')">Skills</button>
            <button onclick="openTab('projects')">Projects</button>
            <button onclick="openTab('achievements')">Achievements</button>
            <button onclick="openTab('contacts')">Contacts</button>
        </div>
    </aside>

    <!-- CENTER SCREEN -->
    <main class="center">
        <div id="screen"></div>
    </main>

</div>

<!-- 🎥 BANNER -->
<section class="banner" id="banner">
    <div class="banner-content">
        <h1 class="glow">ARISE</h1>
        <p>Electronics Engineer • System Builder</p>
    </div>
</section>

<footer>
    <p>© 2026 MWorks</p>
</footer>

<script src="js/script.js"></script>

</html>
